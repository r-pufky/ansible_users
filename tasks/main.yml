---
- name: 'Install | packages'
  ansible.builtin.include_role:
    name: 'r_pufky.deb.apt'
  vars:
    apt_packages:
      - '{{ users___packages }}'
      - '{{
          users___high_entropy_packages
          if users_flg_high_entropy else
          []
        }}'
      - '{{ users___ssh_keygen_packages }}'
    apt_srv_package_update_cache: true

- name: 'Remove groups'
  ansible.builtin.group:
    name: '{{ item }}'
    state: 'absent'
  loop: '{{ users_cfg_groups_absent | default([]) }}'

- name: 'Remove users'
  ansible.builtin.user:
    name: '{{ item }}'
    force: false
    remove: false
    state: 'absent'
  loop: '{{ users_cfg_users_absent | default([]) }}'

- name: 'Manage groups'
  ansible.builtin.include_tasks: 'group.yml'
  loop: '{{ users_cfg_groups | default([]) }}'
  loop_control:
    loop_var: 'group'
  no_log: true  # Passwords.

- name: 'Manage users'
  ansible.builtin.include_tasks: 'user.yml'
  loop: '{{ users_cfg_users | default([]) }}'
  loop_control:
    loop_var: 'user'
  no_log: true  # Passwords, GPG keys, SSH keys.
