---
- name: 'Verify'
  hosts: 'all'
  gather_facts: false
  tasks:
    - name: 'Verify | test | /home/ssh_extension/.ssh/'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'file.yml'
      vars:
        test_name:
          '{{ "Verify | test | /home/ssh_extension/.ssh/" ~ item.file }}'
        test_file: '{{ "/home/ssh_extension/.ssh/" ~ item.file }}'
        test_owner: 'ssh_extension'
        test_group: 'ssh_extension'
        test_mode: '{{ item.mode }}'
        test_state: 'file'
        test_diff: true
      loop:
        - {file: 'id_ed25519', mode: '0400'}
        - {file: 'id_ed25519.pub', mode: '0640'}
        - {file: 'config', mode: '0400'}
        - {file: 'authorized_keys', mode: '0600'}
      loop_control:
        label: '{{ item.file }}'

    # SSH extension conflicts (SSH extension overwrites).
    - name: 'Verify | test | /home/ssh_extension_conflict/.ssh/config'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'file.yml'
      vars:
        test_name: 'Verify | test | /home/ssh_extension_conflict/.ssh/config'
        test_file: '/home/ssh_extension_conflict/.ssh/config'
        test_owner: 'ssh_extension_conflict'
        test_group: 'ssh_extension_conflict'
        test_mode: '0400'
        test_state: 'file'
        test_diff: true

    - name: 'Verify | test | /home/ssh_extension_conflict/.ssh/id_dsa'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'file.yml'
      vars:
        test_name: 'Verify | test | /home/ssh_extension_conflict/.ssh/id_dsa'
        test_file: '/home/ssh_extension_conflict/.ssh/id_dsa'
        test_owner: 'ssh_extension_conflict'
        test_group: 'ssh_extension_conflict'
        test_mode: '0644'
        test_state: 'absent'
        test_diff: true

    - name:
        'Verify | filesystem | query /home/ssh_extension_conflict/.ssh/id_rsa'
      ansible.builtin.slurp:
        path: '/home/ssh_extension_conflict/.ssh/id_rsa'
      register: users__test_ssh_private

    - name:
        'Verify | filesystem | query /home/ssh_extension_conflict/.ssh/id_rsa'
      ansible.builtin.slurp:
        path: '/home/ssh_extension_conflict/.ssh/id_rsa.pub'
      register: users__test_ssh_public

    - name: 'Verify | assert | extended ssh configuration correct'
      ansible.builtin.assert:
        quiet: true
        that:
          - users__test_ssh_private.content | b64decode == 'id_rsa conflict key overwrites'  # yamllint disable-line rule:line-length
          - users__test_ssh_public.content | b64decode == 'id_rsa conflict key overwrites'  # yamllint disable-line rule:line-length
        fail_msg: |

          ✘ ssh_extension_conflict keys invalid.

          Expected .ssh/id_rsa* overwritten by extension ssh.
          id_dsa* deleted.
